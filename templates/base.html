<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MySocial{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="topbar">
        <div class="container topbar-inner">
            <a class="brand" href="/">MySocial</a>
            <nav class="nav">
                <a href="/explore/">Поиск</a>
                {% if user.is_authenticated %}
					<a href="/channels/create/">Создать канал</a>
					<a href="/profile/edit/">Редактировать профиль</a>
					<a href="/u/{{ user.profile.slug }}/">Мой профиль</a>
					<a href="{% url 'notifications' %}">Уведомления</a>
					<form method="post" action="{% url 'logout' %}" style="display:inline;">
						{% csrf_token %}
					<button type="submit">Выйти</button>
				</form>
		{% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="container footer">
        MySocial — стартовый MVP в духе Teletype.
    </footer>
</body>
</html>
