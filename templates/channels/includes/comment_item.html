<div class="comment-item" style="padding:12px 0; border-bottom:1px solid #eee;">
    <div style="display:flex; align-items:center; gap:10px;">
        {% if comment.author.profile.avatar %}
            <img src="{{ comment.author.profile.avatar.url }}" width="36" height="36" style="border-radius:50%; object-fit:cover;">
        {% else %}
            <div style="width:36px;height:36px;border-radius:50%;background:#ddd;"></div>
        {% endif %}
        <div>
            <strong>{{ comment.author.profile.nickname }}</strong><br>
            <small style="color:#777;">{{ comment.created_at|date:"d.m.Y H:i" }}</small>
        </div>
    </div>

    <div style="margin-top:10px;">
        {{ comment.text|linebreaks }}
    </div>
</div>
