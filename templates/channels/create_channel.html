{% extends 'base.html' %}
{% block content %}
<h1>Создать канал</h1>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <p style="color:#777;">Ссылка канала должна быть уникальной. Например: my-blog</p>
    <button type="submit">Создать</button>
</form>
{% endblock %}
