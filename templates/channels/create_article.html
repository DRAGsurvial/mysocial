{% extends 'base.html' %}
{% block content %}
<section class="page-block">
    <div class="form-card">
        <div class="section-header">
            <h1 class="section-title">Новая статья</h1>
        </div>

        <p class="muted" style="margin-top:0;">Канал: {{ channel.title }}</p>

        <form method="post" enctype="multipart/form-data" class="form-grid">
            {% csrf_token %}

            <div class="form-group">
                <label>Заголовок</label>
                {{ form.title }}
            </div>

            <div class="form-group">
                <label>Обложка</label>
                {{ form.cover }}
            </div>

            <div class="form-group">
                <label>Статус</label>
                {{ form.status }}
            </div>

            <div class="form-group">
                <label>Текст статьи</label>
                {{ form.content }}
            </div>

            <div>
                <button type="submit" class="button">Сохранить статью</button>
            </div>
        </form>

        {{ form.media }}
    </div>
</section>
{% endblock %}
